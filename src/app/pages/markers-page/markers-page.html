<div #map class="w-full h-[50vh] sm:h-full"></div>

<section class="w-full min-h-[50vh] sm:min-h-0 sm:fixed sm:top-20 sm:left-4 sm:w-56 bg-white/95 backdrop-blur-sm sm:rounded-xl sm:shadow-xl p-4 sm:max-h-[70vh] overflow-y-auto sm:z-10">
  <h2 class="text-sm font-bold text-gray-700 uppercase tracking-wider mb-3">
    📍 Marcadores
  </h2>
  <div class="flex flex-col divide-y divide-gray-100">
    @for (marker of markers(); track marker.id) {
      <div
        class="flex items-center justify-between py-2 cursor-pointer hover:bg-gray-50 rounded px-1 transition-colors"
        (click)="flyToMarker(marker.maplibreMarker.getLngLat())"
        (dblclick)="deleteMarker(marker)"
      >
        <span class="text-xs text-gray-600 font-mono">
          {{ marker.maplibreMarker.getLngLat().lng.toFixed(4) }},
          {{ marker.maplibreMarker.getLngLat().lat.toFixed(4) }}
        </span>
        <span
          class="w-4 h-4 rounded-full shrink-0 ml-2 shadow-sm"
          [style.backgroundColor]="marker.maplibreMarker._color"
        ></span>
      </div>
    } @empty {
      <div class="flex flex-col items-center py-6 text-gray-400">
        <span class="text-2xl mb-1">🗺️</span>
        <p class="text-xs">Sin marcadores</p>
        <p class="text-xs">Haz clic en el mapa</p>
      </div>
    }
  </div>
</section>
